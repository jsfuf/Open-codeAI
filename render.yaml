services:
  - type: web
    name: ai-chat-api
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: GROQ_API_KEY
        sync: false  # Set in Render dashboard
      - key: GROQ_API_URL
        value: https://opencode.ai/zen/v1/chat/completions
      - key: MODEL_NAME
        value: mimo-v2.5-free
      - key: DEEPSEEK_API_KEY
        sync: false  # Set in Render dashboard
      - key: GEMINI_API_KEY
        sync: false  # Set in Render dashboard
      - key: PORT
        value: 10000
